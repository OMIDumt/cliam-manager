<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaimManager | سامانه هوشمند مدیریت ادعا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #8b5cf6;
        --color-secondary: #a78bfa;
        --color-background: #030712;
        --color-surface: #0f172a;
        --color-surfaceAlt: #1e293b;
        --color-text: #f8fafc;
        --color-textSecondary: #94a3b8;
        --color-border: #1e293b;
        --color-accent: #22d3ee;
        --color-success: #34d399;
        --color-warning: #fbbf24;
        --color-error: #f87171;
        --color-glow: rgba(139, 92, 246, 0.4);
      }

      body {
        font-family: 'Estedad', 'Sahel', 'Vazirmatn', sans-serif;
        background-color: var(--color-background);
        min-height: 100vh;
        color: var(--color-text);
        position: relative;
        overflow-x: hidden;
      }

      /* Ultra Professional Dark Theme - Enhanced */
      .theme-ultraPro {
        background: linear-gradient(180deg, #030712 0%, #0a0a1a 30%, #030712 70%, #0a0a1a 100%);
        position: relative;
      }

      .theme-ultraPro::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(ellipse 800px 800px at 0% 0%, rgba(139, 92, 246, 0.12) 0px, transparent 50%),
          radial-gradient(ellipse 1000px 1000px at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
          radial-gradient(ellipse 1200px 800px at 50% 100%, rgba(236, 72, 153, 0.08) 0px, transparent 50%),
          radial-gradient(ellipse 600px 600px at 0% 100%, rgba(34, 211, 238, 0.08) 0px, transparent 50%);
        z-index: -1;
        pointer-events: none;
        animation: gradientShift 20s ease infinite;
      }

      @keyframes gradientShift {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }

      /* Mesh gradient effect */
      .mesh-gradient {
        background: 
          radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(34, 211, 238, 0.1) 0px, transparent 50%);
        filter: blur(60px);
      }

      /* Glass Panel Effect - Enhanced */
      .glass-panel {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .glass-card {
        background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.85) 50%, rgba(30, 41, 59, 0.6) 100%);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      /* Glow Effects - Enhanced */
      .glow-violet {
        box-shadow: 
          0 0 20px rgba(139, 92, 246, 0.2),
          0 0 40px rgba(139, 92, 246, 0.15),
          0 0 80px rgba(139, 92, 246, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .glow-cyan {
        box-shadow: 
          0 0 20px rgba(34, 211, 238, 0.2),
          0 0 40px rgba(34, 211, 238, 0.15),
          0 0 80px rgba(34, 211, 238, 0.1);
      }

      .text-glow {
        text-shadow: 
          0 0 10px rgba(139, 92, 246, 0.5),
          0 0 20px rgba(139, 92, 246, 0.3),
          0 0 30px rgba(139, 92, 246, 0.2);
      }

      /* Modern Button Effects */
      .btn-modern {
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-modern::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }

      .btn-modern:hover::before {
        width: 300px;
        height: 300px;
      }

      /* Animated border gradient */
      .border-gradient {
        position: relative;
        border-radius: 1rem;
      }

      .border-gradient::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(59, 130, 246, 0.5), rgba(34, 211, 238, 0.5));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        padding: 1px;
        pointer-events: none;
      }

      /* Animated Progress Bar */
      @keyframes progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .animate-progress {
        animation: progress 2s ease-in-out infinite;
      }

      /* Shimmer Effect */
      @keyframes shimmer {
        0% { transform: translateX(-100%) skewX(-15deg); }
        100% { transform: translateX(200%) skewX(-15deg); }
      }

      /* Fade In Animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }

      /* Pulse Glow */
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.6); }
      }

      .animate-pulse-glow {
        animation: pulseGlow 2s ease-in-out infinite;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #6366f1, #8b5cf6);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #8b5cf6, #a78bfa);
      }

      /* Grid pattern - Enhanced */
      .bg-grid {
        background-image: 
          linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
        background-size: 50px 50px;
        background-position: 0 0, 0 0;
        animation: gridMove 20s linear infinite;
      }

      @keyframes gridMove {
        0% { background-position: 0 0, 0 0; }
        100% { background-position: 50px 50px, 50px 50px; }
      }

      /* Floating particles effect */
      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: rgba(139, 92, 246, 0.5);
        border-radius: 50%;
        animation: float 15s infinite ease-in-out;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
      }

      /* Noise texture overlay */
      .noise-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.02;
        pointer-events: none;
        z-index: 1;
      }

      /* Light theme overrides */
      .theme-light,
      .theme-professional,
      .theme-elegant,
      .theme-modern {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
      }

      .theme-light::before,
      .theme-professional::before,
      .theme-elegant::before,
      .theme-modern::before {
        background: 
          radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.05) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      }

      /* Print styles */
      @media print {
        body {
          background: white !important;
          color: black !important;
        }
        
        .glass-panel,
        .glass-card {
          background: white !important;
          border: 1px solid #e5e7eb !important;
        }

        .no-print {
          display: none !important;
        }
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Focus styles */
      *:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      /* Selection styles */
      ::selection {
        background: rgba(139, 92, 246, 0.3);
        color: white;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",

      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="theme-ultraPro noise-overlay">
    <div id="root"></div>

</body>
</html>
